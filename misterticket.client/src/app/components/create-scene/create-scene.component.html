<div class="night-theme auth-container">
  <div class="stars"></div>
  <div class="stars2"></div>

  <div class="auth-card">
    <h2 class="auth-title">Nouvelle Scène / 新しいステージ</h2>
    <div class="torii-divider"></div>

    <div *ngIf="errorMessage" class="error-banner">{{ errorMessage }}</div>
    <div *ngIf="successMessage" class="success-banner">{{ successMessage }}</div>

    <form (ngSubmit)="onSubmit()" #sceneForm="ngForm">
      <div class="form-group">
        <label>Nom de la scène</label>
        <input type="text" name="name" [(ngModel)]="scene.name"
               placeholder="Ex: Grande Halle" required>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>Nombre de rangées</label>
          <input type="number" name="maxRows" [(ngModel)]="scene.maxRows" min="1" required>
        </div>

        <div class="form-group">
          <label>Sièges par rangée</label>
          <input type="number" name="maxColumns" [(ngModel)]="scene.maxColumns" min="1" required>
        </div>
      </div>

      <button type="submit" class="btn-submit" [disabled]="!sceneForm.form.valid">
        Générer la scène
      </button>
    </form>

    <a routerLink="/" class="back-link">← Annuler</a>
  </div>
</div>
